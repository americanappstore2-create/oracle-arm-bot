name: Oracle ARM Instance Creator

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  create-instance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create config files
        run: |
          echo "${{ secrets.OCI_CONFIG }}" > oci_config
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > oci_api_private_key.pem

      - name: Create oci.env
        run: |
          echo "OCI_CONFIG=${{ github.workspace }}/oci_config" > oci.env
          echo "OCT_FREE_AD=${{ secrets.OCT_FREE_AD }}" >> oci.env
          echo "OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}" >> oci.env
          echo "OCI_IMAGE_ID=${{ secrets.OCI_IMAGE_ID }}" >> oci.env
          echo "DISPLAY_NAME=my-arm-instance" >> oci.env
          echo "REQUEST_WAIT_TIME_SECS=50" >> oci.env
          echo "ASSIGN_PUBLIC_IP=True" >> oci.env
          echo "NOTIFY_EMAIL=False" >> oci.env
          echo "SSH_AUTHORIZED_KEYS_FILE=${{ github.workspace }}/ssh_key.pub" >> oci.env

      - name: Debug
        run: |
          cat oci.env
          cat oci_config
          ls -la
          cat launch_instance.log || true
          cat setup_and_info.log || true

      - name: Run script
        run: timeout 250 python main.py || true
        
